name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'smart_cargo_app/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart_cargo_app

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verificar ambiente
        run: flutter doctor -v

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze

      - name: Gerar APK de teste
        run: flutter build apk --debug

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-cargo-apk-debug
          path: smart_cargo_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
