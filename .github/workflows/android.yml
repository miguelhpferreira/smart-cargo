name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verificar arquivos
        run: ls -la && ls -la smart_cargo_app

      - name: Instalar dependências
        run: cd smart_cargo_app && flutter pub get

      - name: Criar APK
        run: cd smart_cargo_app && flutter build apk --debug

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-cargo-debug-apk
          path: smart_cargo_app/build/app/outputs/flutter-apk/app-debug.apk
